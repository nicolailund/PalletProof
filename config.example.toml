[camera]
# "auto" foretraekker internt Raspberry Pi CSI-kamera og falder tilbage til USB/OpenCV.
# "picamera2" eller "opencv" kan bruges til manuel fejlfinding.
backend = "auto"
width = 1920
height = 1080
preview_width = 1280
preview_height = 720
fps = 30
bitrate = 12000000
opencv_device = 0
opencv_fourcc = "MJPG"
# Camera Module 3 bruger autofocus; "continuous" er bedst til håndholdte labels.
autofocus_mode = "continuous"
# "full" tillader både nær og fjern fokus; "fast" reagerer hurtigere når en label vises.
autofocus_range = "full"
autofocus_speed = "fast"

[hardware_scanner]
# Standardflowet bruger SEN-18088 via USB. "auto" kan laese baade HID-keyboard
# og USB-COM/virtuel seriel port.
# Den leder efter /dev/input/by-id/*event-kbd, /dev/serial/by-id/*,
# /dev/ttyACM* og derefter /dev/ttyUSB*.
# Hvis Pi'en ogsaa har USB 4G/5G-modem, er det bedst at saette den konkrete scanner-port
# efter test, fx device = "/dev/serial/by-id/usb-..."
enabled = true
mode = "auto" # "auto", "serial" eller "hid_keyboard"
device = "auto"
baudrate = 115200
reconnect_seconds = 5.0
line_idle_seconds = 0.25
# Hvis SEN-18088 staar i trigger mode, kan Pi'en pulse TRIG-pinnen automatisk.
# Standard er GPIO23, fysisk pin 16. Forbind kun scannerens TRIG og GND til Pi'en.
trigger_gpio_enabled = false
trigger_gpio_pin = 23
# Brug et skånsomt interval, så scannerens lys/aiming LED ikke blinker unødigt ofte.
trigger_interval_seconds = 6.0
# SEN-18088 kan kræve en tydelig puls for at starte scanning stabilt via TRIG.
trigger_pulse_seconds = 0.60
trigger_active_high = false
duplicate_suppress_seconds = 2.0
min_chars = 4
# Provisioning-QR er laengere end normale ordrestregkoder, saa hardware-scanneren
# skal acceptere op til 512 tegn.
max_chars = 512
accepted_pattern = "^[A-Za-z0-9_.()$/+%-]+$"
validate_gs1_ai01_check_digit = true

[barcode]
# Kamera-baseret barcode-scanning er nu fallback og er som standard slaaet fra,
# fordi den bruger CPU og kan give falske/manglende laesninger.
enabled = false
scan_every_n_frames = 2
min_chars = 4
max_chars = 64
# Tilpas til jeres ordrenumre. Eksemplet tillader bogstaver, tal og almindelige
# Code 39/GS1-tegn som bindestreg, $, /, +, %, punktum, underscore og parenteser.
accepted_pattern = "^[A-Za-z0-9_.()$/+%-]+$"
# x, y, width, height for barcode-scan-zonen. Start bredt, og snævr ind hvis kameraet ser for meget støj.
roi = [0.0, 0.0, 1.0, 1.0]
# Hurtig basisprofil: normale retninger plus moderate skæve vinkler.
rotation_degrees = [
  0, 90, 180, 270,
  15, 345, 30, 330,
]
# Begræns dekoderen til de relevante barcode-typer. DataBar er udeladt, fordi den gav støjende falske fund i testbilleder.
formats = [
  "Code128", "Code39", "Code93", "Codabar", "ITF",
  "EAN13", "EAN8", "UPCA", "UPCE",
  "QRCode", "DataMatrix", "PDF417",
]
# Opskalering og preprocessing kan hjælpe svære labels, men koster meget CPU.
scan_scales = [1.0]
preprocess = false
# Start optagelsen når samme gyldige kode er læst på to frames.
confirm_read_count = 2
confirm_window_seconds = 1.5
# Undgå at samme synlige label starter en ny optagelse lige efter stop.
duplicate_suppress_seconds = 8.0
# Ignorer koder, der allerede er synlige lige efter start eller lige efter en optagelse.
ambient_suppress_seconds = 2.0
ambient_absent_seconds = 2.0
# Valider GTIN-14 checkcifferet for GS1 AI(01)-værdier som (01)08584012360472.
validate_gs1_ai01_check_digit = true

[motion]
# x, y, width, height som andel af billedet.
roi = [0.08, 0.08, 0.84, 0.84]
threshold = 0.018
still_seconds = 4.0
minimum_recording_seconds = 30.0
maximum_recording_seconds = 180.0
require_motion_before_stop = true

[recording]
root_dir = "data"
file_extension = ".mp4"

[device]
# I produktion skal denne vaere true: foerste gyldige scan skal vaere en
# PalletProof provisioning-QR med serienummer, kunde/site og WiFi-oplysninger.
# Saet midlertidigt false ved lokal test uden QR/backend.
provisioning_required = true
identity_file = "device_identity.json"
# Bruges kun som fallback, naar provisioning_required = false.
serial_number = "UNPROVISIONED"
provisioning_qr_prefix = "PALLETPROOF"

[privacy]
enabled = false
face_blur = true
delete_source_after_processing = true
# Faste masker er mere forudsigelige end ansigtsdetektion.
# Eksempel: slør øverste venstre del af billedet.
fixed_masks = [
  # [0.0, 0.0, 0.35, 0.25],
]

[sound]
enabled = false
gpio_pin = 18
duration_seconds = 0.12

[status_light]
enabled = true
# "gpio" bruger eksterne LED/lampemoduler. "act_led" blinker Pi'ens indbyggede groenne ACT-LED.
backend = "gpio"
# BCM-nummerering: GPIO27 er fysisk pin 13, GPIO17 er fysisk pin 11.
red_gpio_pin = 27
green_gpio_pin = 17
# Hvis lampen har separat gul indgang, kan den sættes her, fx 22.
# Hvis den udelades, laves gul ved at tænde rød + grøn samtidig.
# yellow_gpio_pin = 22
# true passer til common-cathode LED eller transistor-driver, hvor GPIO high tænder farven.
active_high = true
# Gul vises kort efter godkendt stregkode, før optagelsen starter og lampen bliver rød.
scan_flash_seconds = 0.4
# Bruges kun med backend = "act_led".
sysfs_led_name = "ACT"
restore_trigger = "mmc0"

[preview]
# Web-preview til fejlfinding. Slå til lokalt på Pi'en og åbn http://PI-IP:8080.
enabled = false
host = "0.0.0.0"
port = 8080
max_fps = 5.0
width = 960
jpeg_quality = 70

[upload]
enabled = true
protocol = "sftp" # "sftp", "ftp" eller "ftps"
host = "ftp.example.com"
port = 22
username = "user"
password = "change-me"
remote_dir = "/palle-video"
passive = true
timeout_seconds = 30
retry_seconds = 20
delete_after_upload = false
temp_suffix = ".part"

[software_update]
# Slå først til, når enheden er deployed via GitHub og scripts/install_from_github.sh
# virker manuelt på Pi'en.
enabled = false
manifest_url = "https://raw.githubusercontent.com/nicolailund/PalletProof/main/updates/palletproof-update.json"
repository_dir = "."
state_file = "software_update_state.json"
install_command = "bash scripts/install_from_github.sh"
# Hvor ofte Pi'en henter manifestet fra GitHub.
check_interval_seconds = 300.0
request_timeout_seconds = 10.0
install_timeout_seconds = 600.0
# Enheden skal have været uden aktiv optagelse i mindst dette antal sekunder.
idle_grace_seconds = 15.0
# Hvis installationen fejler, ventes der før næste forsøg.
apply_retry_seconds = 300.0
# Night updates installeres kun i dette lokale tidsvindue.
night_start_hour = 2
night_end_hour = 4
